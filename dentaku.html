<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>電卓</title>
    <style>
        /* 全体のレイアウト */
        .calculator { width: 250px; border: 2px solid #333; padding: 10px; border-radius: 10px; background: #f4f4f4; }
        /* 画面（表示窓） */
        #display { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 10px; box-sizing: border-box; }
        /* ボタンの配置 */
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        button { height: 50px; font-size: 18px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: white; }
        button:active { background: #ddd; }
        .operator { background: #ff9500; color: white; } /* 演算子ボタンの色 */
        .equal { background: #28a745; color: white; grid-column: span 2; } /* ＝ボタン */
    </style>
<body>
    <h1>電卓</h1>
    <div class="calculator">
        <!-- 表示画面 -->
        <input type="text" id="display" disabled>
        
        <div class="buttons">
            <!-- ボタン類 -->
            <button onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')" class="operator">÷</button>
            <button onclick="appendValue('*')" class="operator">×</button>
            <button onclick="backspace()">⌫</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="operator">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="operator">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('0')">0</button>
            
            <button onclick="calculate()" class="equal">=</button>
            <button onclick="appendValue('.')" style="grid-column: span 2;">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // 数字や記号を表示に追加する
        function appendValue(value) {
            display.value += value;
        }

        // 表示を消去する（C）
        function clearDisplay() {
            display.value = '';
        }

        // 1文字消す（⌫）
        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        // 計算を実行する（＝）
        function calculate() {
            try {
                // eval関数を使って文字列を数式として計算する
                display.value = eval(display.value);
            } catch (e) {
                display.value = "Error";
            }
        }
    </script>

</body>
</html>
